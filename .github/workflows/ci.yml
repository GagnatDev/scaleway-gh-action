name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Check dist directories were produced
        run: |
          for dir in registry-login container-deploy container-manage job-run secret-sync dns-record container-domain; do
            if [ ! -f "$dir/dist/index.js" ]; then
              echo "FAIL: $dir/dist/index.js not found"
              exit 1
            fi
            echo "OK: $dir/dist/index.js"
          done

  lint-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate action.yml files
        run: |
          for dir in registry-login container-deploy container-manage job-run secret-sync dns-record container-domain; do
            if [ ! -f "$dir/action.yml" ]; then
              echo "FAIL: $dir/action.yml not found"
              exit 1
            fi
            echo "OK: $dir/action.yml"
          done
